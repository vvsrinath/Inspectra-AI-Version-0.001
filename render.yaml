# Render Blueprint — https://render.com/docs/blueprint-spec
# Repo: https://github.com/vvsrinath/Inspectra-AI-Version-0.001
#
# Works whether Render uses repo root OR Root Directory = backend.
services:
  - type: web
    name: inspectra-api
    runtime: python
    plan: free
    region: oregon
    # Leave rootDir empty so root requirements.txt + runtime.txt apply (Python 3.11)
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
