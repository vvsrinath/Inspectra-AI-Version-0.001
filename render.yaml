# Deploy backend on Render (free tier). Connect repo, set Root Directory: backend
# Then set INSPECTRA_API_URL on Vercel to the Render service URL.
services:
  - type: web
    name: inspectra-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
