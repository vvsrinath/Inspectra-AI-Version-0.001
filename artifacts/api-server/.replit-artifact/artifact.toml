kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8000
name = "API Server"
paths = ["/api"]

[services.development]
run = "python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload --app-dir /home/runner/workspace/backend"

[services.production]

[services.production.build]
args = ["echo", "no-build"]

[services.production.run]
args = ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--app-dir", "/home/runner/workspace/backend"]

[services.production.run.env]
PORT = "8000"

[services.production.health.startup]
path = "/api/"
