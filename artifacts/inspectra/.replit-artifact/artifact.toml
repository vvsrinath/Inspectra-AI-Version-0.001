kind = "web"
previewPath = "/"
title = "Inspectra AI"
version = "1.0.0"
id = "artifacts/inspectra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20195

[services.development]
run = "pnpm --filter @workspace/inspectra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inspectra", "run", "build" ]
publicDir = "artifacts/inspectra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20195"
BASE_PATH = "/"
